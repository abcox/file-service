name: Deploy to Azure App Service (Comprehensive)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual triggers

env:
  NODE_VERSION: '22.14.0'
  AZURE_WEBAPP_NAME: 'vorba-file-service-3'
  AZURE_RESOURCE_GROUP: 'vorba-file-service-rg'
  KEY_VAULT_NAME: 'vorba-file-service-kv'
  AZURE_WEBAPP_PACKAGE_PATH: 'release-package.zip'
  DEPLOY_ENV: 'production'

jobs:
  # optionally, can use job build-and-deploy: ?
  build:
    runs-on: ubuntu-latest # at the time of writing: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build NestJS application
        run: |
          echo "=== BUILD STEP DEBUG ==="
          echo "Ubuntu version: $(lsb_release -rs)"
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Current directory: $(pwd)"
          echo "Running: npm run build"
          
          # Run build with verbose output
          npm run build

      - name: Post build inspection
        run: |
          echo "=== POST-BUILD INSPECTION ==="
          echo "Build exit code: $?"
          echo "Dist directory exists: $(test -d dist && echo 'YES' || echo 'NO')"
          echo "Dist directory contents:"
          ls -la dist/ || echo "dist/ directory not- found"
          
          if [ $? -ne 0 ]; then
            echo "Build failed - exiting"
            exit 1
          else
            echo "Build successful"
          fi

            # TODO: review this step, and if is better to make it part of the build process
      - name: Copy config file to dist
        run: cp src/config/config.${{ env.DEPLOY_ENV }}.json dist/config.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            package.json
            package-lock.json
            startup.sh
          retention-days: 10
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      
      # TODO: review the approach of installing dependencies in the release step
      # rather than in the build step (which becomes tar.gz - and we need to unzip)
      # as well, if node_modules is generated at the build step, we take a performance hit with large upload/download of build artifact
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install production dependencies
        run: |
          cd dist
          npm ci --only=production
      
      # Playwright browser binaries can dramatically increase ZIP size and may break ZIP deploy extraction.
      # For App Service ZIP deploy, prefer runtime-installed browser path or container deployment for Playwright-heavy workloads.
      
      - name: Copy startup script
        run: |
          cp startup.sh dist/
          chmod +x dist/startup.sh
      

      
      - name: Create release package
        run: |
          # Zip dist/ and startup.sh from workspace root to preserve the dist/ path prefix.
          # startup.sh expects: node dist/src/main.js — so dist/ must be at the zip root.
          zip -r release-package.zip dist/ startup.sh
      
      - name: Upload release
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release-package.zip
          retention-days: 10
          if-no-files-found: error
          #compression-level: 9 # 1-9, 9 is best compression
          
      - name: Inspect release contents  # ← Add this step
        run: |
          echo "=== POST-RELEASE INSPECTION ==="
          echo "Zip file size:"
          ls -lh release-package.zip
          
          echo ""
          echo "Zip contents:"
          unzip -l release-package.zip | head -20
          
          echo ""
          echo "Extract and show structure:"
          unzip -q release-package.zip -d temp-extract
          find temp-extract -type f | head -10
          rm -rf temp-extract
          echo "=== END INSPECTION ==="

  deploy:
    runs-on: ubuntu-latest
    needs: release
    # TODO: review how 'environment' is used, and for what purpose/benefit
    #environment:
    #  name: 'production'
    #  url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: ./

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Start App Service (if stopped)
        run: |
          echo "🚀 Ensuring App Service is running..."
          az webapp start --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} || true

      - name: Configure App Service runtime settings
        run: |
          echo "⚙️ Setting runtime app settings (telemetry + build metadata)..."
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --settings \
              APPLICATIONINSIGHTS_CONNECTION_STRING="@Microsoft.KeyVault(SecretUri=https://${{ env.KEY_VAULT_NAME }}.vault.azure.net/secrets/azure-application-insights-connection-string/)" \
              BUILD_ID="${{ github.run_id }}" \
            --output none
          echo "✅ App settings updated"

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          #slot-name: 'production'
          publish-profile: ${{ secrets.AZ_WEBAPP_PUB_PRFL__FILE_SVC_3 }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      # Post-deployment smoke tests - validates deployed app is working correctly
      - name: Post-deployment smoke tests
        run: |
          echo "🧪 Running post-deployment smoke tests..."
          DEPLOY_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          
          # Wait for deployment to be ready
          echo "⏳ Waiting for deployment to be ready..."
          READY=false
          for i in {1..60}; do
            HEALTH_STATUS=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" || echo "000")
            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "✅ Deployment is ready (health check passed)"
              READY=true
              break
            fi
            echo "   Attempt $i: HTTP $HEALTH_STATUS - waiting..."
            sleep 5
          done

          if [ "$READY" != "true" ]; then
            echo "❌ Timed out waiting for health check to return 200 (last status: $HEALTH_STATUS)"
            echo "   App may still be starting or the deployment failed to boot."
            exit 1
          fi

          # Run smoke tests against deployed app
          echo "🔍 Running smoke tests against $DEPLOY_URL"
          
          # Test health endpoint
          HEALTH_RESPONSE=$(curl -s --max-time 10 "$DEPLOY_URL/health")
          echo "Health: $HEALTH_RESPONSE"

          # Test Swagger endpoint (main API entry point)
          SWAGGER_STATUS=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api")
          echo "Swagger endpoint: HTTP $SWAGGER_STATUS"

          # Test diagnostic endpoint
          DIAG_STATUS=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/diagnostic/services")
          echo "Diagnostic endpoint: HTTP $DIAG_STATUS"

          # Validate results
          if [ "$SWAGGER_STATUS" != "200" ]; then
            SWAGGER_BODY=$(curl -s --max-time 10 "$DEPLOY_URL/api")
            echo "❌ Swagger endpoint failed (HTTP $SWAGGER_STATUS)"
            echo "   Response body: $SWAGGER_BODY"
            exit 1
          fi
          
          echo "✅ Post-deployment smoke tests passed!"
          echo ""
          echo "🌐 Deployed URL: $DEPLOY_URL"

      - name: Deployment summary
        if: success()
        run: |
          echo "## 🚀 Web App Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App Name**: ${{ env.AZURE_WEBAPP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ env.DEPLOY_ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke Tests**: ✅ Passed" >> $GITHUB_STEP_SUMMARY

      # Stop App Service after deployment to save costs (runs always, even on failure)
      - name: Stop App Service (cost saving)
        if: always()
        run: |
          echo "🛑 Stopping App Service to save costs..."
          az webapp stop --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}
          echo "✅ App Service stopped. It will start automatically on next deployment."