name: Deploy to Azure Container Instances

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'package.json'
      - 'Dockerfile'
      - 'scripts/deploy/az-container-instance/**'
      - '.github/workflows/azure-deploy-aci.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: false
        default: 'latest'
      environment:
        description: 'Environment'
        required: true
        default: 'development'
        type: choice
        options:
        - development
        - staging
        - production

env:
  ACR_NAME: vorbaacr
  ACI_NAME: vorba-file-service-4
  ACI_LOCATION: canadaeast
  RESOURCE_GROUP: vorba-file-service-rg
  KEY_VAULT_NAME: vorba-file-service-kv
  IMAGE_NAME: file-service
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  # User-assigned managed identity with pre-configured Key Vault access
  MANAGED_IDENTITY_ID: /subscriptions/236217f7-0ad4-4dd6-8553-dc4b574fd2c5/resourcegroups/vorba-file-service-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/vorba-file-service-identity
  # Client ID for DefaultAzureCredential to select the user-assigned identity
  MANAGED_IDENTITY_CLIENT_ID: 48c008c1-dd2a-4786-8ff0-26b96c48744f
  # SQL Server for database connectivity - ACI needs firewall rule
  SQL_SERVER_NAME: vorba-sql-svr-1
  # Log Analytics workspace for reliable ACI logging (ACI logs are unreliable without this!)
  LOG_ANALYTICS_WORKSPACE_NAME: vorba-file-service-logs
  STORAGE_ACCOUNT_NAME: ccastore01
  # Resource group where storage account exists
  STORAGE_RESOURCE_GROUP: cca-cc-rg-01
  CADDY_CONFIG_SHARE: aci-caddy-config
  CADDY_DATA_SHARE: aci-caddy-data
  CADDY_STATE_SHARE: aci-caddy-state
  CADDY_EMAIL: ops@vorba.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          
      - name: Get ACR credentials
        id: acr-credentials
        run: |
          echo "username=$(az acr credential show --name ${{ env.ACR_NAME }} --query "username" --output tsv)" >> $GITHUB_OUTPUT
          echo "password=$(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" --output tsv)" >> $GITHUB_OUTPUT
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      # CRITICAL: ACI uses dynamic IPs - SQL Server firewall must allow Azure services
      - name: Configure SQL Server Firewall for ACI
        run: |
          echo "🔥 Configuring SQL Server firewall for ACI access..."
          
          # Check if AllowAzureServices rule exists
          RULE_EXISTS=$(az sql server firewall-rule show --name "AllowAzureServices" --server ${{ env.SQL_SERVER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --output tsv 2>/dev/null || echo "")
          
          if [ -z "$RULE_EXISTS" ]; then
            echo "Creating AllowAzureServices firewall rule..."
            az sql server firewall-rule create \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server ${{ env.SQL_SERVER_NAME }} \
              --name "AllowAzureServices" \
              --start-ip-address 0.0.0.0 \
              --end-ip-address 0.0.0.0 \
              --output none
            echo "✅ AllowAzureServices rule created"
          else
            echo "✅ AllowAzureServices rule already exists"
          fi
          
          # Check if ACI-Access rule exists (broader rule for dynamic ACI IPs)
          ACI_RULE_EXISTS=$(az sql server firewall-rule show --name "ACI-Access" --server ${{ env.SQL_SERVER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --output tsv 2>/dev/null || echo "")
          
          if [ -z "$ACI_RULE_EXISTS" ]; then
            echo "Creating ACI-Access firewall rule..."
            az sql server firewall-rule create \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server ${{ env.SQL_SERVER_NAME }} \
              --name "ACI-Access" \
              --start-ip-address 0.0.0.0 \
              --end-ip-address 255.255.255.255 \
              --output none
            echo "✅ ACI-Access rule created"
            echo "⚠️ Note: This allows all IPs - consider restricting in production"
          else
            echo "✅ ACI-Access rule already exists"
          fi
      
      # CRITICAL: ACI logs are UNRELIABLE without Log Analytics - crashes lose stdout!
      - name: Setup Log Analytics for ACI Logging
        id: log-analytics
        run: |
          echo "📊 Setting up Log Analytics for reliable ACI logging..."
          
          # Check if workspace exists
          WORKSPACE_EXISTS=$(az monitor log-analytics workspace show --resource-group ${{ env.RESOURCE_GROUP }} --workspace-name ${{ env.LOG_ANALYTICS_WORKSPACE_NAME }} --output json 2>/dev/null || echo "")
          
          if [ -z "$WORKSPACE_EXISTS" ]; then
            echo "Creating Log Analytics workspace..."
            az monitor log-analytics workspace create \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --workspace-name ${{ env.LOG_ANALYTICS_WORKSPACE_NAME }} \
              --location canadaeast \
              --output none
            echo "✅ Log Analytics workspace created"
          else
            echo "✅ Log Analytics workspace already exists"
          fi
          
          # Get workspace ID and key
          WORKSPACE_ID=$(az monitor log-analytics workspace show --resource-group ${{ env.RESOURCE_GROUP }} --workspace-name ${{ env.LOG_ANALYTICS_WORKSPACE_NAME }} --query customerId --output tsv)
          WORKSPACE_KEY=$(az monitor log-analytics workspace get-shared-keys --resource-group ${{ env.RESOURCE_GROUP }} --workspace-name ${{ env.LOG_ANALYTICS_WORKSPACE_NAME }} --query primarySharedKey --output tsv)
          
          echo "workspace_id=$WORKSPACE_ID" >> $GITHUB_OUTPUT
          echo "::add-mask::$WORKSPACE_KEY"
          echo "workspace_key=$WORKSPACE_KEY" >> $GITHUB_OUTPUT
          
          echo "📋 Workspace ID: $WORKSPACE_ID"
          echo "📋 Query logs with: ContainerInstanceLog_CL | where ContainerGroup_s == '${{ env.ACI_NAME }}'"

      - name: Prepare Caddy storage and config
        id: caddy-storage
        run: |
          echo "🔐 Preparing Azure File shares for Caddy config and certificates..."

          STORAGE_ACCOUNT_RG='${{ env.STORAGE_RESOURCE_GROUP }}'
          if [ -z "$STORAGE_ACCOUNT_RG" ]; then
            STORAGE_ACCOUNT_RG=$(az storage account show \
              --name ${{ env.STORAGE_ACCOUNT_NAME }} \
              --query "resourceGroup" --output tsv)
          fi

          if [ -z "$STORAGE_ACCOUNT_RG" ]; then
            echo "❌ Unable to determine resource group for storage account '${{ env.STORAGE_ACCOUNT_NAME }}'"
            exit 1
          fi

          echo "📦 Storage account resource group: $STORAGE_ACCOUNT_RG"

          STORAGE_KEY=$(az storage account keys list \
            --resource-group "$STORAGE_ACCOUNT_RG" \
            --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
            --query "[0].value" --output tsv)

          echo "::add-mask::$STORAGE_KEY"
          echo "storage_key=$STORAGE_KEY" >> $GITHUB_OUTPUT

          for SHARE in ${{ env.CADDY_CONFIG_SHARE }} ${{ env.CADDY_DATA_SHARE }} ${{ env.CADDY_STATE_SHARE }}; do
            EXISTS=$(az storage share show \
              --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
              --account-key "$STORAGE_KEY" \
              --name "$SHARE" --output tsv 2>/dev/null || echo "")
            if [ -z "$EXISTS" ]; then
              echo "Creating share: $SHARE"
              az storage share create \
                --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
                --account-key "$STORAGE_KEY" \
                --name "$SHARE" --output none
              echo "✅ Created share: $SHARE"
            else
              echo "✅ Share already exists: $SHARE"
            fi
          done

          az storage file upload \
            --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
            --account-key "$STORAGE_KEY" \
            --share-name ${{ env.CADDY_CONFIG_SHARE }} \
            --source scripts/deploy/az-container-instance/Caddyfile \
            --output none

          echo "✅ Caddy storage ready"

      - name: Fetch telemetry connection string from Key Vault
        id: appinsights-secret
        run: |
          echo "🔐 Fetching Application Insights connection string from Key Vault..."
          APPINSIGHTS_CONNECTION_STRING=$(az keyvault secret show \
            --vault-name ${{ env.KEY_VAULT_NAME }} \
            --name azure-application-insights-connection-string \
            --query value --output tsv)

          if [ -z "$APPINSIGHTS_CONNECTION_STRING" ]; then
            echo "❌ Failed to fetch azure-application-insights-connection-string from Key Vault."
            echo "   Required: grant the GitHub Actions service principal (i.e. github-actions-deployer) 'Key Vault Secrets User' on vault ${{ env.KEY_VAULT_NAME }}."
            exit 1
          fi

          echo "::add-mask::$APPINSIGHTS_CONNECTION_STRING"
          echo "connection_string=$APPINSIGHTS_CONNECTION_STRING" >> $GITHUB_OUTPUT
          echo "✅ Retrieved Application Insights connection string"

      - name: Generate ACI manifest with Caddy sidecar
        id: aci-manifest
        run: |
          export APP_IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          export ACR_LOGIN_SERVER="${{ env.ACR_NAME }}.azurecr.io"
          export DEPLOY_ENVIRONMENT="${{ github.event.inputs.environment || 'production' }}"
          export CADDY_DOMAIN="${{ env.ACI_NAME }}.${{ env.ACI_LOCATION }}.azurecontainer.io"

          python3 - << 'PY'
          import os
          from pathlib import Path

          template_path = Path("scripts/deploy/az-container-instance/aci-with-caddy.template.yaml")
          output_path = Path("aci-with-caddy.generated.yaml")

          content = template_path.read_text(encoding="utf-8")
          replacements = {
              "__ACI_NAME__": os.environ["ACI_NAME"],
              "__ACI_LOCATION__": os.environ["ACI_LOCATION"],
              "__MANAGED_IDENTITY_ID__": os.environ["MANAGED_IDENTITY_ID"],
              "__MANAGED_IDENTITY_CLIENT_ID__": os.environ["MANAGED_IDENTITY_CLIENT_ID"],
              "__ACR_LOGIN_SERVER__": os.environ["ACR_LOGIN_SERVER"],
              "__ACR_USERNAME__": os.environ["ACR_USERNAME"],
              "__ACR_PASSWORD__": os.environ["ACR_PASSWORD"],
              "__DNS_NAME_LABEL__": os.environ["ACI_NAME"],
              "__APP_IMAGE__": os.environ["APP_IMAGE"],
              "__DEPLOY_ENVIRONMENT__": os.environ["DEPLOY_ENVIRONMENT"],
              "__STORAGE_ACCOUNT_NAME__": os.environ["STORAGE_ACCOUNT_NAME"],
              "__STORAGE_ACCOUNT_KEY__": os.environ["STORAGE_ACCOUNT_KEY"],
              "__CADDY_CONFIG_SHARE__": os.environ["CADDY_CONFIG_SHARE"],
              "__CADDY_DATA_SHARE__": os.environ["CADDY_DATA_SHARE"],
              "__CADDY_STATE_SHARE__": os.environ["CADDY_STATE_SHARE"],
              "__CADDY_EMAIL__": os.environ["CADDY_EMAIL"],
              "__CADDY_DOMAIN__": os.environ["CADDY_DOMAIN"],
              "__APPLICATIONINSIGHTS_CONNECTION_STRING__": os.environ["APPLICATIONINSIGHTS_CONNECTION_STRING"],
              "__BUILD_ID__": os.environ["BUILD_ID"],
          }

          for placeholder, value in replacements.items():
              content = content.replace(placeholder, value)

          output_path.write_text(content, encoding="utf-8")
          print(f"Generated {output_path}")
          PY
        env:
          ACI_NAME: ${{ env.ACI_NAME }}
          ACI_LOCATION: ${{ env.ACI_LOCATION }}
          MANAGED_IDENTITY_ID: ${{ env.MANAGED_IDENTITY_ID }}
          MANAGED_IDENTITY_CLIENT_ID: ${{ env.MANAGED_IDENTITY_CLIENT_ID }}
          ACR_USERNAME: ${{ steps.acr-credentials.outputs.username }}
          ACR_PASSWORD: ${{ steps.acr-credentials.outputs.password }}
          STORAGE_ACCOUNT_NAME: ${{ env.STORAGE_ACCOUNT_NAME }}
          STORAGE_ACCOUNT_KEY: ${{ steps.caddy-storage.outputs.storage_key }}
          CADDY_CONFIG_SHARE: ${{ env.CADDY_CONFIG_SHARE }}
          CADDY_DATA_SHARE: ${{ env.CADDY_DATA_SHARE }}
          CADDY_STATE_SHARE: ${{ env.CADDY_STATE_SHARE }}
          CADDY_EMAIL: ${{ env.CADDY_EMAIL }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ steps.appinsights-secret.outputs.connection_string }}
          BUILD_ID: ${{ github.run_id }}
          
      - name: Deploy to Azure Container Instances
        run: |
          # Check if ACI exists
          ACI_EXISTS=$(az container show --name ${{ env.ACI_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --output json 2>/dev/null | jq -r '.name // empty')
          
          if [ -n "$ACI_EXISTS" ]; then
            echo "Deleting existing ACI instance (required for config changes)..."
            az container delete --name ${{ env.ACI_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --yes
            sleep 10
          fi
          
          echo "Creating ACI container group with Caddy HTTPS sidecar..."
          az container create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --file aci-with-caddy.generated.yaml \
            --log-analytics-workspace ${{ steps.log-analytics.outputs.workspace_id }} \
            --log-analytics-workspace-key ${{ steps.log-analytics.outputs.workspace_key }} \
            --output none
          
      - name: Verify Managed Identity
        run: |
           echo "✅ Using user-assigned managed identity: vorba-file-service-identity"
           echo "   This identity has pre-configured Key Vault access."
           echo "   No role assignment needed on each deployment."
          
      
          
      - name: Wait for ACI to be ready
        run: |
           echo "Waiting for ACI to be ready..."
           sleep 30  # Give ACI time to provision
          
      - name: Get ACI status
        id: aci-status
        run: |
          ACI_STATUS=$(az container show --name ${{ env.ACI_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "provisioningState" --output tsv)
          echo "ACI Status: $ACI_STATUS"
          
          if [ "$ACI_STATUS" = "Succeeded" ]; then
            echo "✅ ACI deployment successful!"
            
            # Get the FQDN
            FQDN=$(az container show --name ${{ env.ACI_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "ipAddress.fqdn" --output tsv)
            echo "🌐 ACI URL: https://$FQDN"
            echo "fqdn=$FQDN" >> $GITHUB_OUTPUT
          else
            echo "❌ ACI deployment failed with status: $ACI_STATUS"
            exit 1
          fi

      # Post-deployment smoke tests - validates deployed container is working correctly
      - name: Post-deployment smoke tests
        run: |
          echo "🧪 Running post-deployment smoke tests..."
          DEPLOY_URL="https://${{ steps.aci-status.outputs.fqdn }}"
          
          # Wait for Caddy to issue certificates and app to become reachable
          echo "⏳ Waiting for HTTPS endpoint to be ready..."
          for i in {1..90}; do
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" --max-time 10 || echo "000")
            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "✅ HTTPS endpoint is ready (health check passed)"
              break
            fi
            echo "   Attempt $i: HTTP $HEALTH_STATUS - waiting..."
            sleep 5
          done
          
          # Run smoke tests against deployed container
          echo "🔍 Running smoke tests against $DEPLOY_URL"
          
          # Test health endpoint
          HEALTH_RESPONSE=$(curl -s "$DEPLOY_URL/health" --max-time 10 || echo "failed")
          echo "Health: $HEALTH_RESPONSE"
          
          # Test root endpoint
          ROOT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/" --max-time 10 || echo "000")
          echo "Root endpoint: HTTP $ROOT_STATUS"
          
          # Test Swagger endpoint
          SWAGGER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api" --max-time 10 || echo "000")
          echo "Swagger endpoint: HTTP $SWAGGER_STATUS"
          
          # Test diagnostic endpoint
          DIAG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/diagnostic/services" --max-time 10 || echo "000")
          echo "Diagnostic endpoint: HTTP $DIAG_STATUS"
          
          # Validate results
          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $HEALTH_STATUS)"
            exit 1
          fi
          
          if [ "$ROOT_STATUS" != "200" ]; then
            echo "⚠️ Root endpoint returned HTTP $ROOT_STATUS (may be expected)"
          fi
          
          echo "✅ Post-deployment smoke tests passed!"
          echo ""
          echo "🌐 Deployed URL: $DEPLOY_URL"
          
      - name: Show ACI logs
        if: always()
        run: |
           echo "📋 Recent ACI logs (from az container logs):"
           az container logs --name ${{ env.ACI_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} || echo "No logs available from az container logs"
           
           echo ""
           echo "📊 Querying Log Analytics for comprehensive logs..."
           echo "   (Log Analytics captures logs even if container crashes!)"
           
           # Wait for logs to be ingested
           sleep 30
           
           # Install log-analytics extension if needed
           az extension add --name log-analytics --yes 2>/dev/null || true
           
           # Query Log Analytics
           az monitor log-analytics query \
             --workspace ${{ steps.log-analytics.outputs.workspace_id }} \
             --analytics-query "ContainerInstanceLog_CL | where ContainerGroup_s == '${{ env.ACI_NAME }}' | order by TimeGenerated desc | take 50 | project TimeGenerated, Message" \
             --output table 2>/dev/null || echo "Log Analytics query failed or no logs yet (may take a few minutes to ingest)"
           
           echo ""
           echo "🔧 Container Status:"
           az container show --name ${{ env.ACI_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "{state:containers[0].instanceView.currentState.state,exitCode:containers[0].instanceView.currentState.exitCode,restartCount:containers[0].instanceView.restartCount}" --output table
          
      - name: Post deployment info
        if: success()
        run: |
          FQDN=$(az container show --name ${{ env.ACI_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "ipAddress.fqdn" --output tsv)
          echo "## 🚀 ACI Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **ACI Name**: ${{ env.ACI_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://$FQDN" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke Tests**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Log Analytics" >> $GITHUB_STEP_SUMMARY
          echo "- **Workspace**: ${{ env.LOG_ANALYTICS_WORKSPACE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Query logs**: \`ContainerInstanceLog_CL | where ContainerGroup_s == '${{ env.ACI_NAME }}'\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Important Notes" >> $GITHUB_STEP_SUMMARY
          echo "- ACI has no free tier - you pay per second of runtime" >> $GITHUB_STEP_SUMMARY
          echo "- ACI uses managed identity for Key Vault access" >> $GITHUB_STEP_SUMMARY
          echo "- SQL Server firewall is configured to allow ACI dynamic IPs" >> $GITHUB_STEP_SUMMARY
          echo "- Log Analytics captures logs even if container crashes (ACI native logs are unreliable!)" >> $GITHUB_STEP_SUMMARY
          echo "- Stop ACI after testing: \`az container stop --name ${{ env.ACI_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}\`" >> $GITHUB_STEP_SUMMARY
