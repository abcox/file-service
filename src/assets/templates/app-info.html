<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px 20px;
      background: #0f1115;
      color: #e7edf5;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
    }
    .logo {
      width: 200px;
      height: 200px;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      max-width: 100%;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    p {
      color: #b8c2d3;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    .info {
      background: #171b24;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: left;
      border: 1px solid #2a3140;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
    }
    .info-label {
      font-weight: 600;
      color: #c9d3e3;
    }
    .info-value {
      color: #8ba6ff;
      font-family: monospace;
    }
    a {
      color: #9cb4ff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      {{logoSvg}}
    </div>
    <h1>{{name}}</h1>
    <p>{{description}}</p>
    <div class="info">
      <div class="info-row">
        <span class="info-label">Version</span>
        <span class="info-value">{{version}}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Status</span>
        <span class="info-value">{{status}}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Updated</span>
        <span class="info-value">{{timestamp}}</span>
      </div>
    </div>
    <p><a href="/api">View API Docs</a></p>
  </div>
</body>
</html>
