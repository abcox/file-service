apiVersion: 2021-10-01
name: __ACI_NAME__
location: __ACI_LOCATION__
identity:
  type: UserAssigned
  userAssignedIdentities:
    __MANAGED_IDENTITY_ID__: {}
properties:
  osType: Linux
  restartPolicy: OnFailure
  imageRegistryCredentials:
    - server: __ACR_LOGIN_SERVER__
      username: __ACR_USERNAME__
      password: __ACR_PASSWORD__

  ipAddress:
    type: Public
    dnsNameLabel: __DNS_NAME_LABEL__
    ports:
      - protocol: tcp
        port: 80
      - protocol: tcp
        port: 443

  volumes:
    - name: caddy-config
      azureFile:
        shareName: __CADDY_CONFIG_SHARE__
        storageAccountName: __STORAGE_ACCOUNT_NAME__
        storageAccountKey: __STORAGE_ACCOUNT_KEY__
    - name: caddy-data
      azureFile:
        shareName: __CADDY_DATA_SHARE__
        storageAccountName: __STORAGE_ACCOUNT_NAME__
        storageAccountKey: __STORAGE_ACCOUNT_KEY__
    - name: caddy-state
      azureFile:
        shareName: __CADDY_STATE_SHARE__
        storageAccountName: __STORAGE_ACCOUNT_NAME__
        storageAccountKey: __STORAGE_ACCOUNT_KEY__

  containers:
    - name: app
      properties:
        image: __APP_IMAGE__
        ports:
          - port: 8080
            protocol: tcp
        resources:
          requests:
            cpu: 2
            memoryInGB: 4
        environmentVariables:
          - name: NODE_ENV
            value: __DEPLOY_ENVIRONMENT__
          - name: BUILD_ID
            value: __BUILD_ID__
          - name: PORT
            value: "8080"
          - name: PLAYWRIGHT_BROWSER_PATH
            value: /ms-playwright/chromium-*/chrome-linux/chrome
          - name: DEBUG_STARTUP
            value: "true"
          - name: AZURE_CLIENT_ID
            value: __MANAGED_IDENTITY_CLIENT_ID__
          - name: APPLICATIONINSIGHTS_CONNECTION_STRING
            secureValue: __APPLICATIONINSIGHTS_CONNECTION_STRING__

    - name: caddy
      properties:
        image: caddy:2.8-alpine
        command:
          - caddy
          - run
          - --config
          - /etc/caddy/Caddyfile
          - --adapter
          - caddyfile
        ports:
          - port: 80
            protocol: tcp
          - port: 443
            protocol: tcp
        resources:
          requests:
            cpu: 0.5
            memoryInGB: 0.5
        environmentVariables:
          - name: CADDY_EMAIL
            value: __CADDY_EMAIL__
          - name: CADDY_DOMAIN
            value: __CADDY_DOMAIN__
        volumeMounts:
          - name: caddy-config
            mountPath: /etc/caddy
          - name: caddy-data
            mountPath: /data
          - name: caddy-state
            mountPath: /config
